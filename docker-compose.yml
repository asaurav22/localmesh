version: 3.9

services:
  control_plane:
    image: python:3.13-slim
    container_name: localmesh_control_plane
    ports:
      - 7000:7000

  order_service:
    image: python:3.13-slim
    container_name: localmesh_order_service
    ports:
      - 9001:9001

  payment_service:
    image: python:3.11-slim
    container_name: localmesh_payment_service
    ports:
      - 9002:9002